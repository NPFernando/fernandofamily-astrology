name: Build and publish images

on:
  push:
    branches: [main]

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io

jobs:
  vars:
    runs-on: ubuntu-latest
    outputs:
      owner: ${{ steps.lower.outputs.owner }}
    steps:
      - name: Lowercase the repository owner (GHCR requires lowercase image names)
        id: lower
        run: echo "owner=${OWNER,,}" >> "$GITHUB_OUTPUT"
        env:
          OWNER: ${{ github.repository_owner }}

  build-api:
    needs: vars
    runs-on: ubuntu-latest
    env:
      API_IMAGE: ghcr.io/${{ needs.vars.outputs.owner }}/fernandofamily-astrology-api
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v7
        with:
          context: .
          file: infra/docker/Dockerfile.api
          platforms: linux/amd64,linux/arm64
          push: true
          build-args: |
            GIT_SHA=${{ github.sha }}
          tags: |
            ${{ env.API_IMAGE }}:${{ github.sha }}
            ${{ env.API_IMAGE }}:latest

  build-web:
    needs: vars
    runs-on: ubuntu-latest
    env:
      WEB_IMAGE: ghcr.io/${{ needs.vars.outputs.owner }}/fernandofamily-astrology-web
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v7
        with:
          context: .
          file: infra/docker/Dockerfile.web
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ env.WEB_IMAGE }}:${{ github.sha }}
            ${{ env.WEB_IMAGE }}:latest
