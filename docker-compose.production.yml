services:
  api:
    # Deploy pulls pre-built multi-arch images from GHCR rather than
    # rebuilding on the production host — see infra/deploy/deploy.sh.
    image: ${API_IMAGE:-ghcr.io/npfernando/fernandofamily-astrology-api}:${IMAGE_TAG:-latest}
    build:
      args:
        GIT_SHA: ${GIT_SHA}
    # !override (not merge) — Compose concatenates list-type keys like
    # `ports` across files by default, which would leave the base file's
    # 0.0.0.0:8000 binding active alongside this one. This must fully
    # replace it, not add to it, or "loopback only" wouldn't be true.
    ports: !override
      - "127.0.0.1:8100:8000"
    env_file:
      - .env
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  web:
    image: ${WEB_IMAGE:-ghcr.io/npfernando/fernandofamily-astrology-web}:${IMAGE_TAG:-latest}
    ports: !override
      - "127.0.0.1:3100:3000"
    # Lets the web container reach the host's Postgres for account
    # profiles/preferences (pg_hba on the host restricts containers to the
    # astrology database + role only).
    extra_hosts:
      - "host.docker.internal:host-gateway"
    env_file:
      - .env
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
