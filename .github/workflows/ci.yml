name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tools (pyswisseph compiles a C extension)
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends gcc g++

      - name: Install dependencies
        run: pip install -r apps/api/requirements-dev.txt

      - name: Verify vendored PyJHora engine
        working-directory: apps/api
        run: python3 scripts/verify_vendor.py --mode full

      - name: Ruff
        working-directory: apps/api
        run: ruff check app scripts tests

      - name: Pytest
        working-directory: apps/api
        run: pytest tests -v

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Enable Corepack (pnpm)
        run: corepack enable

      - name: Install dependencies
        working-directory: apps/web
        run: pnpm install --frozen-lockfile

      - name: Lint
        working-directory: apps/web
        run: pnpm lint

      - name: Type check
        working-directory: apps/web
        run: npx tsc --noEmit

      - name: Build
        working-directory: apps/web
        run: pnpm build

      - name: Test (i18n hygiene, no-birth-fields-in-URL)
        working-directory: apps/web
        run: pnpm test
